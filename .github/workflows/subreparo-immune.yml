name: SubReparo Immune

on:
  pull_request:
    paths:
      - "tools/subreparo-immune/**"
      - ".github/workflows/subreparo-immune.yml"
  push:
    branches:
      - main
    paths:
      - "tools/subreparo-immune/**"
      - ".github/workflows/subreparo-immune.yml"

jobs:
  python:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/subreparo-immune
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest mypy ruff build

      - name: Ruff
        run: ruff check src tests

      - name: Type check
        run: mypy src

      - name: Tests
        run: pytest

      - name: Build package
        run: python -m build

      - name: Smoke test core commands
        run: |
          subreparo-immune init .
          subreparo-immune setup . --mode developer --watch src --json
          subreparo-immune run . --json
          subreparo-immune feedback . --false-positive ci/example.py --reason "CI sample" --json
          subreparo-immune trust . --json
          subreparo-immune watch-plan . --json
          subreparo-immune rules --json
          subreparo-immune inventory . --json
          subreparo-immune trends . --json
          subreparo-immune timeline . --json
          subreparo-immune quality . --json
          subreparo-immune sign-report . --json
          subreparo-immune sign-report . --verify --json
          subreparo-immune forensic . --json
          subreparo-cortex . --plan --json
          subreparo-cortex . --next --json
          subreparo-cortex . --status --json
          subreparo-cortex . --approvals --json
          subreparo-cortex . --components --json
          subreparo-sbom . --json
          subreparo-modes --json
          subreparo-quarantine . --json
          subreparo-monitor . --once --json
